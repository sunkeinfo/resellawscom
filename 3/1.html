<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云服务业务综合申请表</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; margin: 0; padding: 20px; background-color: #f4f7f9; }
        .form-container { max-width: 700px; margin: 20px auto; padding: 30px; background-color: #fff; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #555; }
        select, input[type="text"], textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        textarea { resize: vertical; min-height: 100px; }
        button { width: 100%; padding: 15px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 18px; font-weight: bold; transition: background-color 0.3s; }
        button:hover { background-color: #0056b3; }
        .service-options { display: none; border-left: 3px solid #007bff; padding-left: 20px; margin-top: 20px; }
        #form-status { margin-top: 20px; font-weight: bold; text-align: center; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted){window.location='#'}"></iframe>

    <div class="form-container">
        <h2>云服务业务综合申请表</h2>
        <p>请首先选择您需要的业务类型，表单将自动显示相关选项。</p>

        <form 
            id="zoho-unified-form" 
            action="https://forms.zohopublic.com/sunkemedia/form/Untitled2/formperma/submit" 
            method="POST" 
            target="hidden_iframe"
        >
            <!-- 步骤 1: 选择业务类型 (name 和 value 已更新) -->
            <div class="form-group">
                <label for="service-type">1. 选择您需要的业务类型 <span style="color:red;">*</span></label>
                <select id="service-type" name="Dropdown" required>
                    <option value="" disabled selected>--请选择--</option>
                    <option value="第一选项">AWS 通用型云服务器</option>
                    <option value="第二选项">独享静态住宅IP远程网络电脑</option>
                    <option value="第三选项">AWS 高性能云服务器</option>
                    <!-- 假设Windows远程桌面对应第四个选项，如果不是请在Zoho后台添加 -->
                    <option value="第四选项">Windows 远程桌面</option> 
                </select>
            </div>

            <!-- 动态选项区域 (所有 name 和 value 属性均已更新) -->
            <div id="dynamic-options-container">
                <!-- A. AWS 通用型云服务器选项 -->
                <div id="options-general" class="service-options">
                    <div class="form-group"><label>2. 选择服务器所在地区 <span style="color:red;">*</span></label><select name="Dropdown1"><option value="第一选项">日本</option><option value="第二选项">韩国</option><option value="第三选项">美国</option><option value="第四选项">新加坡</option><option value="第五选项">台湾</option><option value="第六选项">香港</option><option value="第七选项">德国</option><option value="第八选项">英国</option><option value="第九选项">其他</option></select></div>
                    <div class="form-group"><label>3. 选择服务器操作系统 <span style="color:red;">*</span></label><select name="Dropdown2"><option value="第一选项">Centos 9</option><option value="第二选项">Ubuntu 22</option><option value="第三选项">Debian 11</option><option value="第四选项">Windows 2022</option><option value="第五选项">其他</option></select></div>
                    <div class="form-group"><label>4. 选择云服务器的配置和规格 <span style="color:red;">*</span></label><select name="Dropdown3"><option value="第一选项">T2.nano, 0.5G 内存, 1vCPU, Network Performance (1 Gibps)</option><option value="第二选项">T2.micro, 1G 内存, 1vCPU, Network Performance (1 Gibps)</option><option value="第三选项">T2.small, 2G 内存, 1vCPU, Network Performance (1 Gibps)</option><option value="第四选项">T3a.medium, 4G 内存, 2vCPU, Network Performance (2 Gibps)</option><option value="第五选项">T3a.large, 8G 内存, 2vCPU, Network Performance (2 Gibps)</option><option value="第六选项">T3.xlarge, 16G 内存, 4vCPU, Network Performance (5 Gibps)</option><option value="第七选项">T3.2xlarge, 32G 内存, 8vCPU, Network Performance (5 Gibps)</option><option value="第八选项">其他</option></select></div>
                </div>

                <!-- B. 独享静态住宅IP选项 -->
                <div id="options-residential" class="service-options">
                    <div class="form-group"><label>2. 选择IP所在地区 <span style="color:red;">*</span></label><select name="Dropdown4"><option value="第一选项">美国</option><option value="第二选项">日本</option><option value="第三选项">韩国</option><option value="第四选项">英国</option><option value="第五选项">德国</option><option value="第六选项">加拿大</option><option value="第七选项">其他</option></select></div>
                    <div class="form-group"><label>3. 选择服务器操作系统 <span style="color:red;">*</span></label><select name="Dropdown5"><option value="第一选项">Centos 9</option><option value="第二选项">Ubuntu 22</option><option value="第三选项">Debian 11</option><option value="第四选项">Windows 2022</option><option value="第五选项">其他</option></select></div>
                    <div class="form-group"><label>4. 选择服务器的配置和规格 <span style="color:red;">*</span></label><select name="Dropdown6"><option value="第一选项">2核心4G内存机型, 5Gbps网络带宽</option><option value="第二选项">4核心16G内存机型, 5Gbps网络带宽</option><option value="第三选项">8核心64G内存机型, 10Gbps网络带宽</option></select></div>
                </div>

                <!-- C. AWS 高性能云服务器选项 -->
                <div id="options-performance" class="service-options">
                     <div class="form-group"><label>2. 高性能服务器IP所在地区 <span style="color:red;">*</span></label><select name="Dropdown7"><option value="第一选项">日本</option><option value="第二选项">韩国</option><option value="第三选项">美国</option><option value="第四选项">新加坡</option><option value="第五选项">台湾</option><option value="第六选项">香港</option><option value="第七选项">德国</option><option value="第八选项">英国</option><option value="第九选项">其他</option></select></div>
                    <div class="form-group"><label>3. 选择服务器操作系统 <span style="color:red;">*</span></label><select name="Dropdown8"><option value="第一选项">Centos 9</option><option value="第二选项">Ubuntu 22</option><option value="第三选项">Debian 11</option><option value="第四选项">Windows 2022</option><option value="第五选项">其他</option></select></div>
                    <div class="form-group"><label>4. 选择服务器的配置和规格 <span style="color:red;">*</span></label><select name="Dropdown9"><option value="第一选项">C6in.4xlarge, 16核心, 32G内存, Network bandwidth(50 Gibps)</option><option value="第二选项">C6in.8xlarge, 32核心, 64G内存, Network bandwidth(50 Gibps)</option><option value="第三选项">M5zn.3xlarge, 12核心, 48G内存, Network bandwidth(25 Gibps)</option><option value="第四选项">M5zn.6xlarge, 24核心, 96G内存, Network bandwidth(50 Gibps)</option><option value="第五选项">其他</option></select></div>
                </div>

                <!-- D. Windows 远程桌面选项 -->
                <div id="options-windows" class="service-options">
                    <div class="form-group"><label>2. 选择 Amazon WorkSpaces 区域 <span style="color:red;">*</span></label><select name="Dropdown10"><option value="第一选项">美国东部 (弗吉尼亚北部)</option><option value="第二选项">美国西部 (俄勒冈)</option><option value="第三选项">加拿大 (中部)</option><option value="第四选项">AWS GovCloud (美国东部)</option><option value="第五选项">AWS GovCloud (美国西部)</option><option value="第六选项">欧洲 (爱尔兰)</option><option value="第七选项">欧洲 (法兰克福)</option><option value="第八选项">欧洲 (伦敦)</option><option value="第九选项">欧洲 (巴黎)</option><option value="第十选项">亚太 (东京)</option><option value="第十一选项">亚太 (首尔)</option><option value="第十二选项">亚太 (新加坡)</option><option value="第十三选项">亚太 (悉尼)</option><option value="第十四选项">亚太 (孟买)</option><option value="第十五选项">南美洲 (圣保罗)</option><option value="第十六选项">非洲 (开普敦)</option><option value="第十七选项">以色列 (特拉维夫)</option></select></div>
                    <div class="form-group"><label>3. 选择配置和规格 <span style="color:red;">*</span></label><select name="Dropdown11"><option value="第一选项">T2.micro, 1G 内存, 1vCPU 价格 35元</option><option value="第二选项">T2.small, 2G 内存, 1vCPU 价格 70元</option><option value="第三选项">T3a.medium, 4G 内存, 2vCPU 价格 140元</option><option value="第四选项">T3a.large, 8G 内存, 2vCPU 价格 280元</option><option value="第五选项">T3.xlarge, 16G 内存, 4vCPU 价格 450元</option><option value="第六选项">T3.2xlarge, 32G 内存, 8vCPU 价格 900元</option><option value="第七选项">其他</option></select></div>
                </div>
            </div>

            <!-- 通用字段 (name 已更新) -->
            <div id="common-fields" style="display:none;">
                 <div class="form-group"><label id="payment-label">选择付款方式 <span style="color:red;">*</span></label><select name="Dropdown12" required><option value="第一选项">USDT 数字加密货币</option><option value="第二选项">轉數快– FPS 香港</option><option value="第三选项">信用卡</option><option value="第四选项">在线商城</option><option value="第五选项">支付宝 微信</option></select></div>
                <div class="form-group"><label id="contact-label">联系方式 (Email, Telegram等) <span style="color:red;">*</span></label><textarea name="MultiLine" placeholder="请输入您的Email邮箱，Telegram账号，或其他任何方便的联系方法" required></textarea></div>
                <div class="form-group"><label id="remarks-label">其他备注 (选填)</label><textarea name="MultiLine1" placeholder="如果您选择了'其他'规格或有任何特殊要求，请在此处说明"></textarea></div>
            </div>

            <button type="submit">提交申请</button>
        </form>

        <div id="form-status"></div>
    </div>

    <script>
        let submitted = false;
        const form = document.getElementById('zoho-unified-form');
        const statusDiv = document.getElementById('form-status');
        
        form.addEventListener('submit', function() {
            statusDiv.textContent = '提交成功！我们已收到您的申请，将尽快与您联系。';
            statusDiv.style.color = 'green';
            submitted = true;
            setTimeout(function() {
                form.reset();
                document.querySelectorAll('.service-options').forEach(div => div.style.display = 'none');
                document.getElementById('common-fields').style.display = 'none';
                statusDiv.textContent = '';
            }, 1000);
        });

        const serviceSelect = document.getElementById('service-type');
        const allOptionDivs = document.querySelectorAll('.service-options');
        const commonFieldsDiv = document.getElementById('common-fields');
        
        serviceSelect.addEventListener('change', function() {
            const selectedValue = this.options[this.selectedIndex].text; // 获取显示文本

            allOptionDivs.forEach(div => {
                div.style.display = 'none';
                div.querySelectorAll('select, textarea').forEach(input => input.disabled = true);
            });

            if(this.value !== "") { // 只要不是默认的"--请选择--"
                commonFieldsDiv.style.display = 'block';
            } else {
                commonFieldsDiv.style.display = 'none';
            }

            let selectedOptionGroup = '';
            if (selectedValue.includes('通用型')) selectedOptionGroup = 'general';
            else if (selectedValue.includes('住宅IP')) selectedOptionGroup = 'residential';
            else if (selectedValue.includes('高性能')) selectedOptionGroup = 'performance';
            else if (selectedValue.includes('Windows')) selectedOptionGroup = 'windows';

            if (selectedOptionGroup) {
                const targetDiv = document.getElementById(`options-${selectedOptionGroup}`);
                if (targetDiv) {
                    targetDiv.style.display = 'block';
                    targetDiv.querySelectorAll('select, textarea').forEach(input => {
                        input.disabled = false;
                        input.required = true;
                    });
                }
            }
        });
    </script>

</body>
</html>
