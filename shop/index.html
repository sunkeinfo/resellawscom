<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>400 Not Found</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #e8f0ff, #ffffff);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: #ffffff;
      padding: 50px 40px;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
      text-align: center;
      max-width: 480px;
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 48px;
      margin: 0;
      color: #1a1a1a;
      letter-spacing: 1px;
    }

    p {
      margin-top: 15px;
      color: #555;
      font-size: 16px;
      line-height: 1.6;
    }

    .home-btn {
      display: inline-block;
      margin-top: 25px;
      padding: 12px 28px;
      background-color: #007bff;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 15px;
      transition: background 0.25s ease, transform 0.2s ease;
    }

    .home-btn:hover {
      background-color: #005fcc;
      transform: translateY(-2px);
    }

    .icon {
      font-size: 60px;
      color: #007bff;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⚠️</div>
    <h1>400</h1>
    <p>The request could not be processed or the page you are looking for does not exist.</p>
    <p>Please return to the homepage.</p>
    <a class="home-btn" href="https://resellaws.com">Back to Homepage</a>
  </div>
</body>
</html>
